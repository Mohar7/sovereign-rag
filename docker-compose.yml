# Full self-hosted stack. Ollama is expected to run on the HOST
# (http://localhost:11434) — bring it up with `ollama serve` and
# `ollama pull qwen2.5:7b && ollama pull bge-m3`.
#
#   docker compose up -d                    # Milvus + Neo4j + SearXNG
#   docker compose --profile app up --build # + the API container
#
# Milvus Standalone is three services (etcd + minio + milvus) per the
# official deployment; versions pinned to the 2.6.x line.

services:

  # ---------- Milvus standalone (etcd + minio + milvus) ----------
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd-data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks: [sovereign]
    restart: unless-stopped

  milvus-minio:
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio-data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks: [sovereign]
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.6.16
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    volumes:
      - milvus-data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "${MILVUS_HOST_PORT:-19530}:19530"          # gRPC client
      - "${MILVUS_HEALTH_HOST_PORT:-9091}:9091"     # health/metrics
    depends_on:
      - milvus-etcd
      - milvus-minio
    networks: [sovereign]
    restart: unless-stopped

  # ---------- Neo4j Community (has native vector index) ----------
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?set NEO4J_PASSWORD in .env}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j-data:/data
    ports:
      - "${NEO4J_HTTP_HOST_PORT:-7474}:7474"   # browser UI
      - "${NEO4J_BOLT_HOST_PORT:-7687}:7687"   # bolt
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks: [sovereign]
    restart: unless-stopped

  # ---------- Postgres (LangGraph checkpoint store) ----------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sovereign
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sovereign-dev-pw}
      POSTGRES_DB: sovereign_lg
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      # Default host port 5433 (5432 is often already in use). CI overrides
      # via env to coexist with a parallel dev stack on the same host.
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sovereign -d sovereign_lg"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [sovereign]
    restart: unless-stopped

  # ---------- SearXNG (self-hosted metasearch, no API key) ----------
  searxng:
    image: searxng/searxng:latest
    environment:
      SEARXNG_BASE_URL: http://localhost:8080/
    volumes:
      - ./deploy/searxng:/etc/searxng:rw
    ports:
      - "${SEARXNG_HOST_PORT:-8082}:8080"
    networks: [sovereign]
    restart: unless-stopped

  # ---------- The API (opt-in via `--profile app`) ----------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sovereign-rag:latest
    profiles: [app]
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      MILVUS_URI: http://milvus:19530
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?set NEO4J_PASSWORD in .env}
      SEARXNG_URL: http://searxng:8080
      LANGGRAPH_PG_URI: postgresql://sovereign:${POSTGRES_PASSWORD:-sovereign-dev-pw}@postgres:5432/sovereign_lg
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"  # reach host Ollama from container
    depends_on:
      milvus:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks: [sovereign]
    restart: unless-stopped

  # ---------- LangGraph server (opt-in via `--profile ui`) ----------
  # Same image as `app`; just a different entrypoint. The frontend talks
  # to this via the in-network hostname `langgraph` on port 2024.
  langgraph:
    build:
      context: .
      dockerfile: Dockerfile
    image: sovereign-rag:latest
    profiles: [ui]
    command:
      [
        "uv",
        "run",
        "langgraph",
        "dev",
        "--host",
        "0.0.0.0",
        "--port",
        "2024",
        "--no-browser",
        # pydantic-settings reads `.env` synchronously on RAGPipeline init;
        # langgraph dev's blocking-call detector flags it. The actual call
        # happens once per process at first request, so the impact is
        # bounded. `BG_JOB_ISOLATED_LOOPS=true` is the production-grade
        # alternative for `langgraph build`.
        "--allow-blocking"
      ]
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      MILVUS_URI: http://milvus:19530
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?set NEO4J_PASSWORD in .env}
      SEARXNG_URL: http://searxng:8080
      LANGGRAPH_PG_URI: postgresql://sovereign:${POSTGRES_PASSWORD:-sovereign-dev-pw}@postgres:5432/sovereign_lg
    ports:
      - "${LANGGRAPH_HOST_PORT:-2024}:2024"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      milvus:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks: [sovereign]
    restart: unless-stopped

  # ---------- Web UI (opt-in via `--profile ui`) ----------
  # Static SPA served by nginx; nginx proxies /lg/* to the LangGraph
  # service above so the browser sees a same-origin server (no CORS).
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: sovereign-rag-frontend:latest
    profiles: [ui]
    environment:
      LANGGRAPH_UPSTREAM: http://langgraph:2024
      NGINX_PORT: "80"
    ports:
      - "${FRONTEND_HOST_PORT:-8080}:80"
    depends_on:
      - langgraph
    networks: [sovereign]
    restart: unless-stopped

volumes:
  etcd-data:
  minio-data:
  milvus-data:
  neo4j-data:
  postgres-data:

networks:
  sovereign:
    driver: bridge
