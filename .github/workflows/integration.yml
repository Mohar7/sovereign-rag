# Integration tests against the LIVE stack (Milvus + Neo4j + SearXNG),
# executed on a self-hosted runner (a Mac Mini with Docker).
#
# Why self-hosted: GitHub-hosted runners can't run the full Milvus standalone
# stack within job limits. The Mac Mini runs the compose stack locally.
#
# Models: the LLM runs on Ollama Cloud (https://ollama.com) and embeddings run
# on OpenAI — Ollama Cloud does not expose an embeddings endpoint. Both are
# supplied as repo secrets (OLLAMA_API_KEY, OPENAI_API_KEY).
#
# SECURITY: triggers are limited to push-to-main and manual dispatch. Fork
# pull requests do NOT run here — a self-hosted runner must never execute
# untrusted PR code. Keep "Require approval for outside collaborators" on in
# repo Settings -> Actions as defense in depth.

name: Integration (self-hosted)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    # Runner must be registered with these labels on the Mac Mini:
    #   ./config.sh --labels self-hosted,macOS,sovereign
    runs-on: [self-hosted, macOS, sovereign]
    timeout-minutes: 40
    env:
      # Isolate CI's docker resources so `down -v` can never touch a local
      # `sovereign-rag` checkout's containers/volumes on this shared runner host.
      COMPOSE_PROJECT_NAME: sovereign-ci
      NEO4J_PASSWORD: sovereign-ci-pw
      # LLM on Ollama Cloud.
      OLLAMA_BASE_URL: https://ollama.com
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
      LLM_MODEL: kimi-k2.6
      # Embeddings on OpenAI (Ollama Cloud has no embeddings API).
      EMBED_PROVIDER: openai
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_EMBED_MODEL: text-embedding-3-large
      EMBED_DIM: "3072"
      # Host ports — bumped off the defaults so CI coexists with any local
      # dev stack on the same self-hosted runner (sovereign-rag uses
      # 19530/9091/7474/7687/8082/5433 by default). docker-compose.yml
      # reads these via `${MILVUS_HOST_PORT:-19530}` etc.
      MILVUS_HOST_PORT: "19531"
      MILVUS_HEALTH_HOST_PORT: "9092"
      NEO4J_HTTP_HOST_PORT: "7475"
      NEO4J_BOLT_HOST_PORT: "7688"
      POSTGRES_HOST_PORT: "5434"
      SEARXNG_HOST_PORT: "8083"
      # In-process URIs that match the host ports above.
      MILVUS_URI: http://localhost:19531
      NEO4J_URI: neo4j://localhost:7688
      SEARXNG_URL: http://localhost:8083
      POSTGRES_PASSWORD: sovereign-ci-pw
      LANGGRAPH_PG_URI: postgresql://sovereign:sovereign-ci-pw@localhost:5434/sovereign_lg
      # Opt-in flags the integration tests gate on.
      RUN_NEO4J_IT: "1"
      RUN_INGESTION_IT: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync deps
        run: uv sync --frozen

      - name: Install Playwright browser (Crawl4AI live crawl test)
        run: uv run playwright install chromium

      - name: Bring up infra (Milvus + Neo4j + Postgres + SearXNG)
        run: docker compose up -d milvus neo4j postgres searxng

      - name: Wait for Milvus health
        run: |
          for i in $(seq 1 60); do
            if curl -sf "http://localhost:${MILVUS_HEALTH_HOST_PORT}/healthz" >/dev/null; then
              echo "Milvus healthy"; exit 0
            fi
            echo "waiting for Milvus ($i)..."; sleep 5
          done
          echo "Milvus did not become healthy"; docker compose logs milvus; exit 1

      - name: Wait for Neo4j health
        run: |
          for i in $(seq 1 30); do
            if curl -sf "http://localhost:${NEO4J_HTTP_HOST_PORT}" >/dev/null; then
              echo "Neo4j healthy"; exit 0
            fi
            echo "waiting for Neo4j ($i)..."; sleep 5
          done
          echo "Neo4j did not become healthy"; docker compose logs neo4j; exit 1

      - name: Wait for Postgres health
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T postgres pg_isready -U sovereign -d sovereign_lg >/dev/null 2>&1; then
              echo "Postgres healthy"; exit 0
            fi
            echo "waiting for Postgres ($i)..."; sleep 2
          done
          echo "Postgres did not become healthy"; docker compose logs postgres; exit 1

      - name: Run integration tests
        run: uv run pytest -m integration -v

      - name: Run live eval harness (precision@k + RAGAS on Ollama)
        run: uv run python eval/evaluate.py

      - name: Tear down infra
        if: always()
        run: docker compose down -v
