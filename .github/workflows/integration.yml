# Integration tests against the LIVE stack (Milvus + Neo4j + SearXNG + Ollama),
# executed on a self-hosted runner (a Mac Mini with Docker + Ollama).
#
# Why self-hosted: GitHub-hosted runners can't run Ollama or the full Milvus
# standalone stack within job limits. The Mac Mini already has Ollama with the
# models pulled and can run the compose stack.
#
# SECURITY: triggers are limited to push-to-main and manual dispatch. Fork
# pull requests do NOT run here — a self-hosted runner must never execute
# untrusted PR code. Keep "Require approval for outside collaborators" on in
# repo Settings -> Actions as defense in depth.

name: Integration (self-hosted)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    # Runner must be registered with these labels on the Mac Mini:
    #   ./config.sh --labels self-hosted,macOS,sovereign
    runs-on: [self-hosted, macOS, sovereign]
    timeout-minutes: 40
    env:
      NEO4J_PASSWORD: sovereign-ci-pw
      # Point the test client at the locally-running services.
      OLLAMA_BASE_URL: http://localhost:11434
      MILVUS_URI: http://localhost:19530
      NEO4J_URI: neo4j://localhost:7687
      SEARXNG_URL: http://localhost:8080
      # Opt-in flags the integration tests gate on.
      RUN_NEO4J_IT: "1"
      RUN_INGESTION_IT: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync deps
        run: uv sync --frozen

      - name: Ensure Ollama models present
        run: |
          ollama pull qwen2.5:7b
          ollama pull bge-m3

      - name: Bring up infra (Milvus + Neo4j + SearXNG)
        run: docker compose up -d milvus neo4j searxng

      - name: Wait for Milvus health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:9091/healthz >/dev/null; then
              echo "Milvus healthy"; exit 0
            fi
            echo "waiting for Milvus ($i)..."; sleep 5
          done
          echo "Milvus did not become healthy"; docker compose logs milvus; exit 1

      - name: Wait for Neo4j health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7474 >/dev/null; then
              echo "Neo4j healthy"; exit 0
            fi
            echo "waiting for Neo4j ($i)..."; sleep 5
          done
          echo "Neo4j did not become healthy"; docker compose logs neo4j; exit 1

      - name: Run integration tests
        run: uv run pytest -m integration -v

      - name: Run live eval harness (precision@k + RAGAS on Ollama)
        run: uv run python eval/evaluate.py

      - name: Tear down infra
        if: always()
        run: docker compose down -v
