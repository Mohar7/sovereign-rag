# Full self-hosted stack. Ollama is expected to run on the HOST
# (http://localhost:11434) — bring it up with `ollama serve` and
# `ollama pull qwen2.5:7b && ollama pull bge-m3`.
#
#   docker compose up -d                    # Milvus + Neo4j + SearXNG
#   docker compose --profile app up --build # + the API container
#
# Milvus Standalone is three services (etcd + minio + milvus) per the
# official deployment; versions pinned to the 2.6.x line.

services:

  # ---------- Milvus standalone (etcd + minio + milvus) ----------
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.25
    container_name: sovereign-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd-data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks: [sovereign]

  milvus-minio:
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    container_name: sovereign-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio-data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks: [sovereign]

  milvus:
    image: milvusdb/milvus:v2.6.16
    container_name: sovereign-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    volumes:
      - milvus-data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"  # gRPC client
      - "9091:9091"    # health/metrics
    depends_on:
      - milvus-etcd
      - milvus-minio
    networks: [sovereign]

  # ---------- Neo4j Community (has native vector index) ----------
  neo4j:
    image: neo4j:5-community
    container_name: sovereign-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?set NEO4J_PASSWORD in .env}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j-data:/data
    ports:
      - "7474:7474"  # browser UI
      - "7687:7687"  # bolt
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks: [sovereign]

  # ---------- SearXNG (self-hosted metasearch, no API key) ----------
  searxng:
    image: searxng/searxng:latest
    container_name: sovereign-searxng
    environment:
      SEARXNG_BASE_URL: http://localhost:8080/
    volumes:
      - ./deploy/searxng:/etc/searxng:rw
    ports:
      - "8082:8080"
    networks: [sovereign]

  # ---------- The API (opt-in via `--profile app`) ----------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sovereign-rag:latest
    container_name: sovereign-api
    profiles: [app]
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      MILVUS_URI: http://milvus:19530
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?set NEO4J_PASSWORD in .env}
      SEARXNG_URL: http://searxng:8080
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"  # reach host Ollama from container
    depends_on:
      milvus:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks: [sovereign]

volumes:
  etcd-data:
  minio-data:
  milvus-data:
  neo4j-data:

networks:
  sovereign:
    driver: bridge
