# Fast feedback CI — runs on every push and PR to main.
# Hard-enforced: ruff (lint + format) and mypy. Unit tests with coverage.
# Heavy live-stack tests live in integration.yml.

name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "docs/**"

# A newer push to the same ref cancels the older in-flight run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_FROZEN: "1"

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --all-extras --dev

      - name: ruff check
        run: uv run ruff check src/ tests/ eval/

      - name: ruff format --check
        run: uv run ruff format --check src/ tests/ eval/

      # Strict on production code (src/); tests/eval kept loose because their
      # ad-hoc dict literals don't survive mypy's dict-invariance pedantry and
      # pinning them helps no real reader.
      - name: mypy (production code)
        run: uv run mypy src/

  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --all-extras --dev

      # Integration tests need Milvus / Neo4j / Ollama, which are not provisioned
      # here — exclude them and run only the service-free suite with coverage.
      - name: Run unit tests with coverage
        run: >-
          uv run pytest -m "not integration"
          --cov=src/sovereign_rag
          --cov=eval
          --cov-report=xml
          --cov-report=term-missing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn
